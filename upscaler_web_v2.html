<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upscaler Procedural Adaptativo (Até 8x)</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-bg: #1a1a24;
            --primary: #2196F3;
            --primary-hover: #1976D2;
            --success: #4CAF50;
            --text: #ffffff;
            --text-secondary: #aaaaaa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 22px;
            margin-bottom: 20px;
            text-align: center;
            color: var(--text);
            font-weight: 600;
        }

        .section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .file-input-wrapper {
            position: relative;
            display: block;
            text-align: center;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .btn-success {
            background-color: var(--success);
            color: white;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            margin-top: 10px;
        }

        .btn-primary:disabled {
            background-color: #444455;
            color: #888888;
            cursor: not-allowed;
        }

        input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-name {
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            word-break: break-all;
        }

        .control-group {
            margin-bottom: 12px;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 6px;
            color: #ddd;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #333344;
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }

        .preview-container {
            width: 100%;
            height: 200px;
            background: #0b0b0e;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px dashed rgba(255, 255, 255, 0.15);
        }

        .preview-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .status-text {
            text-align: center;
            font-size: 13px;
            margin-top: 10px;
            color: #ffb74d;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Upscaler Adaptativo (Até 8x) 🚀</h1>

    <!-- 1. Seleção de imagem -->
    <div class="section">
        <div class="section-title">1. Escolher Imagem</div>
        <div class="file-input-wrapper">
            <button class="btn btn-success">Selecionar do Celular / PC</button>
            <input type="file" id="imageInput" accept="image/*">
        </div>
        <div class="file-name" id="fileName">Nenhuma imagem selecionada</div>
    </div>

    <!-- 2. Configurações -->
    <div class="section">
        <div class="section-title">2. Ajustes do Filtro</div>
        
        <div class="control-group">
            <label><span>Fator de Redimensionamento:</span> <strong id="factorVal">2x</strong></label>
            <input type="range" id="scaleFactor" min="2" max="8" step="1" value="2">
        </div>

        <div class="control-group">
            <label><span>Nível de Detalhe (Chance):</span> <strong id="detailVal">25%</strong></label>
            <input type="range" id="detailLevel" min="0" max="100" step="1" value="25">
        </div>
    </div>

    <!-- 3. Preview -->
    <div class="section">
        <div class="section-title">Pré-visualização</div>
        <div class="preview-container">
            <img id="previewImg" src="" alt="" style="display: none;">
            <span id="previewPlaceholder" style="color: #555;">Sua imagem aparecerá aqui</span>
        </div>
    </div>

    <button id="runBtn" class="btn btn-primary" disabled>EXECUTAR UPSCALER</button>
    <div id="status" class="status-text"></div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const fileName = document.getElementById('fileName');
    const scaleFactor = document.getElementById('scaleFactor');
    const factorVal = document.getElementById('factorVal');
    const detailLevel = document.getElementById('detailLevel');
    const detailVal = document.getElementById('detailVal');
    const previewImg = document.getElementById('previewImg');
    const previewPlaceholder = document.getElementById('previewPlaceholder');
    const runBtn = document.getElementById('runBtn');
    const status = document.getElementById('status');

    let originalImage = null;

    scaleFactor.addEventListener('input', () => factorVal.innerText = scaleFactor.value + 'x');
    detailLevel.addEventListener('input', () => detailVal.innerText = detailLevel.value + '%');

    imageInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        fileName.innerText = file.name;
        
        const reader = new FileReader();
        reader.onload = function(event) {
            originalImage = new Image();
            originalImage.onload = function() {
                previewImg.src = event.target.result;
                previewImg.style.display = 'block';
                previewPlaceholder.style.display = 'none';
                runBtn.disabled = false;
                status.innerText = '';
            };
            originalImage.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    runBtn.addEventListener('click', () => {
        if (!originalImage) return;

        runBtn.disabled = true;
        status.innerText = 'Processando... Aguarde um instante (processamento em fatores altos como 8x pode demorar no celular)';
        
        setTimeout(() => {
            try {
                const factor = parseInt(scaleFactor.value);
                const detail = parseFloat(detailLevel.value);

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                const newWidth = originalImage.width * factor;
                const newHeight = originalImage.height * factor;
                
                canvas.width = newWidth;
                canvas.height = newHeight;

                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.drawImage(originalImage, 0, 0, newWidth, newHeight);

                const imgData = ctx.getImageData(0, 0, newWidth, newHeight);
                const data = imgData.data;

                if (detail > 0) {
                    const probability = (detail / 100.0) / 4.0;
                    const originalBuffer = new Uint8ClampedArray(data);

                    function getPixel(x, y) {
                        x = Math.max(0, Math.min(newWidth - 1, x));
                        y = Math.max(0, Math.min(newHeight - 1, y));
                        const idx = (y * newWidth + x) * 4;
                        return [originalBuffer[idx], originalBuffer[idx+1], originalBuffer[idx+2]];
                    }

                    for (let y = 0; y < newHeight; y++) {
                        for (let x = 0; x < newWidth; x++) {
                            
                            if (Math.random() < probability) {
                                const currentIdx = (y * newWidth + x) * 4;
                                const isChance1em4 = Math.floor(Math.random() * 4) === 0;

                                if (isChance1em4) {
                                    const nx = x + Math.floor(Math.random() * 3) - 1;
                                    const ny = y + Math.floor(Math.random() * 3) - 1;
                                    const neighborColor = getPixel(nx, ny);
                                    
                                    data[currentIdx] = neighborColor[0];
                                    data[currentIdx+1] = neighborColor[1];
                                    data[currentIdx+2] = neighborColor[2];
                                } else {
                                    let rSum = 0, gSum = 0, bSum = 0, count = 0;
                                    
                                    for (let ky = -1; ky <= 1; ky++) {
                                        for (let kx = -1; kx <= 1; kx++) {
                                            const c = getPixel(x + kx, y + ky);
                                            rSum += c[0];
                                            gSum += c[1];
                                            bSum += c[2];
                                            count++;
                                        }
                                    }
                                    
                                    let rCommon = Math.round(rSum / count);
                                    let gCommon = Math.round(gSum / count);
                                    let bCommon = Math.round(bSum / count);

                                    const noise = Math.floor(Math.random() * 11) - 5;

                                    data[currentIdx] = Math.max(0, Math.min(255, rCommon + noise));
                                    data[currentIdx+1] = Math.max(0, Math.min(255, gCommon + noise));
                                    data[currentIdx+2] = Math.max(0, Math.min(255, bCommon + noise));
                                }
                            }
                        }
                    }
                    ctx.putImageData(imgData, 0, 0);
                }

                const link = document.createElement('a');
                link.download = 'imagem_upscaled_adaptativa.png';
                link.href = canvas.toDataURL('image/png');
                link.click();

                status.innerText = 'Pronto! O download começou automaticamente. ✨';
            } catch (err) {
                console.error(err);
                status.innerText = 'Ocorreu um erro. Se a imagem for gigantesca para 8x, tente um fator um pouco menor.';
            } finally {
                runBtn.disabled = false;
            }
        }, 50);
    });
</script>

</body>
</html>
